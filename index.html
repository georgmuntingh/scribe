<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scribe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="./assets/index-DyHyJprx.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-D6wFCYBX.css">
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <header class="header">
        <button class="header__btn" id="theme-btn" title="Toggle theme">
          &#x1F4BB;
        </button>
        <h1 class="header__title">Scribe</h1>
        <div class="header__actions">
          <button class="header__btn" id="speakers-btn" title="Speaker names">
            &#x1F465;
          </button>
          <button class="header__btn" id="settings-btn" title="Settings">
            &#x2699;&#xFE0F;
          </button>
        </div>
      </header>

      <!-- Status -->
      <div class="status" id="status"></div>

      <!-- Progress bar -->
      <div class="progress" id="progress">
        <div class="progress__bar">
          <div class="progress__fill" id="progress-fill"></div>
        </div>
        <div class="progress__text" id="progress-text"></div>
      </div>

      <!-- Transcript -->
      <div class="transcript transcript--empty" id="transcript">
        Transcript will appear here...
      </div>

      <div class="transcript__actions">
        <button class="btn" id="copy-btn" disabled>Copy</button>
        <button class="btn" id="download-btn" disabled>Download</button>
        <button class="btn" id="save-btn" disabled>Save</button>
        <button class="btn" id="clear-btn" disabled>Clear</button>
        <button class="btn" id="identify-btn" disabled>Identify</button>
        <button class="btn" id="library-btn">Library</button>
      </div>

      <!-- File drop zone -->
      <div class="dropzone" id="dropzone">
        Drop an audio file here, or click to browse
        <input type="file" id="file-input" accept="audio/*" />
      </div>

      <!-- Recording controls -->
      <div class="controls">
        <button class="btn btn--primary btn--large" id="record-btn" disabled>
          Record
        </button>
        <div class="mode-toggle">
          <button class="mode-toggle__btn" id="mode-realtime">
            Real-time
          </button>
          <button class="mode-toggle__btn" id="mode-manual">Manual</button>
        </div>
      </div>

      <!-- Settings modal backdrop -->
      <div class="modal-backdrop" id="modal-backdrop"></div>
    </div>

  </body>
</html>
